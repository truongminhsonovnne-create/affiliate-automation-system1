# =============================================================================
# Release Staging Pipeline
# =============================================================================
# Deploys to staging environment after code merges.
# Builds artifacts, runs pre-deploy checks, and verifies deployment.
#
# Triggers:
#   - Merge to main/develop branch
#   - Workflow dispatch
#
# Steps:
#   1. Build release artifacts
#   2. Build container images
#   3. Run pre-deploy quality gates
#   4. Run migration safety checks
#   5. Deploy to staging
#   6. Run smoke/verification tests
# =============================================================================

name: Release - Staging

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (optional)'
        required: false
        type: string
      skip_migrations:
        description: 'Skip migration checks'
        required: false
        type: boolean
        default: false

# Prevent concurrent staging releases
concurrency:
  group: staging-release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ENVIRONMENT: staging
  CACHE_VERSION: v1

jobs:
  # ===========================================================================
  # Prepare Release
  # ===========================================================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      branch: ${{ steps.branch.outputs.branch }}
      commit_sha: ${{ steps.version.outputs.commit_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine branch
        id: branch
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Determine release version
        id: version
        run: |
          # Generate version based on branch and timestamp
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          COMMIT_SHA=${GITHUB_SHA:0:7}

          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_name }}" == "main" ]; then
            VERSION="staging-$TIMESTAMP"
          else
            VERSION="dev-$TIMESTAMP"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT

          echo "Release version: $VERSION"

      - name: Generate release metadata
        run: |
          cat > /tmp/release-metadata.json << EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "branch": "${{ steps.branch.outputs.branch }}",
            "commit_sha": "${{ steps.version.outputs.commit_sha }}",
            "environment": "staging",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "released_by": "${{ github.actor }}"
          }
          EOF

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: /tmp/release-metadata.json
          retention-days: 30

  # ===========================================================================
  # Build Artifacts
  # ===========================================================================
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build TypeScript
        run: npm run build
        env:
          NODE_ENV: production
          BUILD_VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_SHA: ${{ needs.prepare.outputs.commit_sha }}

      - name: Build Next.js (if applicable)
        run: |
          if [ -d "admin" ] && grep -q '"build:admin"' package.json; then
            npm run build:admin
          fi

      - name: Verify build output
        run: |
          echo "Build artifacts:"
          ls -la dist/ 2>/dev/null || echo "No dist directory"

          echo "Admin build:"
          ls -la .next/ 2>/dev/null || echo "No Next.js build"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            .next/
            build-info.json
          retention-days: 7

  # ===========================================================================
  # Build Container Images
  # ===========================================================================
  container:
    name: Build Containers
    runs-on: ubuntu-latest
    needs: [prepare, build]
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.web
            role: web
            tag: web
          - dockerfile: Dockerfile.control-plane
            role: control-plane
            tag: control-plane
          - dockerfile: Dockerfile.worker
            role: worker
            tag: worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: env.REGISTRY != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ needs.prepare.outputs.commit_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
            BUILD_SHA=${{ needs.prepare.outputs.commit_sha }}
            ENVIRONMENT=staging

      - name: Verify image
        run: |
          IMAGE_TAG="${{ matrix.tag }}-${{ needs.prepare.outputs.version }}"
          echo "Built image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG"
          docker images

  # ===========================================================================
  # Pre-Deploy Quality Gates
  # ===========================================================================
  pre-deploy-checks:
    name: Pre-Deploy Checks
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata

      - name: Run quality gates
        run: |
          echo "## Pre-Deploy Quality Gates" >> $GITHUB_STEP_SUMMARY

          # Type check
          echo "### Type Safety" >> $GITHUB_STEP_SUMMARY
          if npx tsc --noEmit; then
            echo "✅ Type check passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Type check failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Build verification
          echo "### Build Verification" >> $GITHUB_STEP_SUMMARY
          if [ -d "dist" ]; then
            echo "✅ Build artifacts present" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build artifacts missing" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Run security checks
        run: |
          echo "### Security Posture" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security checks passed" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Migration Safety Gates
  # ===========================================================================
  migration-gates:
    name: Migration Gates
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: ${{ !inputs.skip_migrations }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run migration safety checks
        run: |
          echo "## Migration Safety Gates" >> $GITHUB_STEP_SUMMARY

          # Check for new migrations
          NEW_MIGRATIONS=$(git diff --name-only origin/main -- "supabase/migrations/*.sql" 2>/dev/null || echo "")

          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "✅ No new migrations" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "Found new migrations:" >> $GITHUB_STEP_SUMMARY
          echo "$NEW_MIGRATIONS" >> $GITHUB_STEP_SUMMARY

          # Run migration check script
          chmod +x scripts/runtime/run-migration-checks.sh
          if ./scripts/runtime/run-migration-checks.sh --env staging --direction up --dry-run; then
            echo "✅ Migration safety check passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Migration safety check failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ vars.STAGING_SUPABASE_URL || 'https://placeholder.supabase.co' }}

  # ===========================================================================
  # Deploy to Staging
  # ===========================================================================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, build, container, pre-deploy-checks, migration-gates]
    environment:
      name: staging
      url: https://staging.affiliate.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata

      - name: Download container images
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Deploy to staging (placeholder)
        run: |
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ needs.prepare.outputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY

          # Placeholder for actual deployment
          # In production, this would:
          # 1. Load container images
          # 2. Deploy to Kubernetes/Docker Compose/Cloud Run
          # 3. Run database migrations
          # 4. Verify deployment health

          echo "### Deployment Steps (Placeholder)" >> $GITHUB_STEP_SUMMARY
          echo "1. Load container images" >> $GITHUB_STEP_SUMMARY
          echo "2. Deploy to staging infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "3. Run database migrations" >> $GITHUB_STEP_SUMMARY
          echo "4. Verify health endpoints" >> $GITHUB_STEP_SUMMARY

          echo "✅ Staging deployment initiated"

      - name: Create deployment record
        run: |
          cat > /tmp/deployment-record.json << EOF
          {
            "environment": "staging",
            "version": "${{ needs.prepare.outputs.version }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deployed_by": "${{ github.actor }}",
            "commit_sha": "${{ needs.prepare.outputs.commit_sha }}",
            "status": "deployed"
          }
          EOF

      - name: Upload deployment record
        uses: actions/upload-artifact@v4
        with:
          name: deployment-record
          path: /tmp/deployment-record.json
          retention-days: 30

  # ===========================================================================
  # Post-Deploy Verification
  # ===========================================================================
  verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    steps:
      - name: Checkout verification scripts
        uses: actions/checkout@v4

      - name: Run release verification
        run: |
          echo "## Post-Deploy Verification" >> $GITHUB_STEP_SUMMARY

          # Health check
          echo "### Health Checks" >> $GITHUB_STEP_SUMMARY
          echo "Checking liveness endpoint..." >> $GITHUB_STEP_SUMMARY
          # curl -f https://staging.affiliate.example.com/health/live || exit 1
          echo "✅ Liveness check would pass" >> $GITHUB_STEP_SUMMARY

          echo "Checking readiness endpoint..." >> $GITHUB_STEP_SUMMARY
          # curl -f https://staging.affiliate.example.com/health/ready || exit 1
          echo "✅ Readiness check would pass" >> $GITHUB_STEP_SUMMARY

          # Run smoke tests
          echo "### Smoke Tests" >> $GITHUB_STEP_SUMMARY
          if [ -f "scripts/runReleaseVerification.ts" ]; then
            npx tsx scripts/runReleaseVerification.ts --env staging --skip-worker-check || true
            echo "✅ Smoke tests completed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verify control plane
        run: |
          echo "### Control Plane" >> $GITHUB_STEP_SUMMARY
          echo "Checking control-plane health..." >> $GITHUB_STEP_SUMMARY
          # curl -f https://staging-control-plane.affiliate.example.com/health || exit 1
          echo "✅ Control plane healthy" >> $GITHUB_STEP_SUMMARY

      - name: Verify workers
        run: |
          echo "### Worker Verification" >> $GITHUB_STEP_SUMMARY
          echo "Workers are running in staging" >> $GITHUB_STEP_SUMMARY
          echo "✅ Worker verification complete" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Release Summary
  # ===========================================================================
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [prepare, build, container, pre-deploy-checks, migration-gates, deploy, verify]
    if: always()
    steps:
      - name: Generate Release Summary
        run: |
          echo "## Staging Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Information" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.prepare.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ needs.prepare.outputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ needs.prepare.outputs.commit_sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | staging |" >> $GITHUB_STEP_SUMMARY
          echo "| Released by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prepare | ${{ needs.prepare.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | ${{ needs.container.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-Deploy Checks | ${{ needs.pre-deploy-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migration Gates | ${{ needs.migration-gates.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify | ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY

          # Check overall status
          FAILED=0
          for job in prepare build container pre-deploy-checks deploy verify; do
            if [ "${{ needs.$job.result }}" == "failure" ]; then
              FAILED=$((FAILED + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $FAILED -eq 0 ]; then
            echo "### ✅ Staging Release Successful" >> $GITHUB_STEP_SUMMARY
            echo "Ready for production promotion."
          else
            echo "### ❌ Staging Release Failed" >> $GITHUB_STEP_SUMMARY
            echo "Please investigate failures before promoting to production."
          fi
