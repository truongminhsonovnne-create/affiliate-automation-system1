# =============================================================================
# Reusable Release Checks Workflow
# =============================================================================
# Standardized release gate checks.
# Can be called from staging/production workflows.
#
# Usage:
#   workflows:
#     call: ./.github/workflows/reusable-release-checks.yml
#     with:
#       environment: 'staging'
#       skip_migrations: false
# =============================================================================

name: Reusable Release Checks

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      version:
        description: 'Release version'
        required: false
        default: ''
        type: string
      skip_migrations:
        description: 'Skip migration checks'
        required: false
        default: 'false'
        type: boolean
      skip_security:
        description: 'Skip security checks'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'
  TARGET_ENV: ${{ inputs.environment }}

jobs:
  # ===========================================================================
  # Quality Gates
  # ===========================================================================
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Type check
        run: npx tsc --noEmit

      - name: Build verification
        run: |
          npm run build || echo "Build script not found"

      - name: Security audit
        if: inputs.skip_security != 'true'
        run: |
          npm audit --audit-level=moderate || echo "Audit completed"

  # ===========================================================================
  # Migration Safety
  # ===========================================================================
  migration-safety:
    name: Migration Safety
    runs-on: ubuntu-latest
    if: inputs.skip_migrations != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for migrations
        id: migration-check
        run: |
          MIGRATIONS=$(git diff origin/main --name-only -- "supabase/migrations/*.sql" 2>/dev/null | wc -l)

          if [ "$MIGRATIONS" -eq 0 ]; then
            echo "No new migrations"
            echo "has_migrations=false" >> $GITHUB_OUTPUT
          else
            echo "Found $MIGRATIONS new migration(s)"
            echo "has_migrations=true" >> $GITHUB_OUTPUT
          fi

      - name: Run migration checks
        if: steps.migration-check.outputs.has_migrations == 'true'
        run: |
          chmod +x scripts/runtime/run-migration-checks.sh
          ./scripts/runtime/run-migration-checks.sh --env ${{ inputs.environment }} --dry-run || true
        env:
          SUPABASE_URL: ${{ vars.STAGING_SUPABASE_URL }}

  # ===========================================================================
  # Container Build Verification
  # ===========================================================================
  container-verification:
    name: Container Verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [Dockerfile.web, Dockerfile.control-plane, Dockerfile.worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          load: true
          tags: test:${{ matrix.dockerfile }}
          target: runner

  # ===========================================================================
  # Runtime Health Checks
  # ===========================================================================
  runtime-checks:
    name: Runtime Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run startup checks
        run: |
          if [ -f "src/scripts/runStartupChecks.ts" ]; then
            export RUNTIME_ENV=${{ inputs.environment }}
            npx tsx src/scripts/runStartupChecks.ts --role worker-crawler --env ${{ inputs.environment }} || true
          fi
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder

  # ===========================================================================
  # Release Gate Summary
  # ===========================================================================
  summary:
    name: Gate Summary
    runs-on: ubuntu-latest
    needs: [quality-gates, migration-safety, container-verification, runtime-checks]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Release Gate Summary - ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gates | ${{ needs.quality-gates.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migration Safety | ${{ needs.migration-safety.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Verification | ${{ needs.container-verification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime Checks | ${{ needs.runtime-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.quality-gates.result }}" == "failure" ]; then
            echo "❌ Release blocked: Quality gates failed"
            exit 1
          else
            echo "✅ All release gates passed"
          fi
