name: Sync — Offers

# ──────────────────────────────────────────────────────────────────────────────
# SCHEDULE (UTC+7 Vietnam = UTC - 7)
#
# Incremental: 06:07 → 23:37 Vietnam  =  23:07 → 16:37 UTC
#   Every 30 min: minute pairs {7,37} on hours 23→16 (wrapping midnight)
#   Total: 34 runs/day
#
# Full sync:   00:07 Vietnam            =  17:07 UTC  (previous day)
# Backfill:    00:37 Vietnam            =  17:37 UTC  (previous day)
#   Once daily each
#
# Example — convert Vietnam → UTC:
#   Vietnam 00:07 = UTC 17:07  (day before)
#   Vietnam 00:37 = UTC 17:37  (day before)
#   Vietnam 06:07 = UTC 23:07  (day before)
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Incremental: every 30 min from 06:07 → 23:37 Vietnam
    #   UTC: 23:07, 23:37, 22:07, 22:37, ..., 16:07, 16:37
    - cron: '7,37 23,22,21,20,19,18,17,16,15,14,13,12,11,10,9,8,7,0 * * *'
    # Full sync:  00:07 Vietnam = 17:07 UTC
    # Backfill:   00:37 Vietnam = 17:37 UTC
    - cron: '7,37 17 * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Prevent concurrent runs — if a job is already running, cancel it
concurrency:
  group: sync-offers
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED GITHUB SECRETS — Settings → Secrets and variables → Actions
# ──────────────────────────────────────────────────────────────────────────────
# AccessTrade:
#   ACCESSTRADE_API_KEY  — from pub.accesstrade.vn
# MasOffer:
#   MASOFFER_API_TOKEN   — from publisher.masoffer.net
#   MASOFFER_PUBLISHER_ID — your MasOffer publisher ID
# Shared:
#   SUPABASE_URL          — https://xxx.supabase.co
#   SUPABASE_SERVICE_KEY  — service role key
# ──────────────────────────────────────────────────────────────────────────────

env:
  ACCESSTRADE_API_KEY: ${{ secrets.ACCESSTRADE_API_KEY }}
  MASOFFER_API_TOKEN: ${{ secrets.MASOFFER_API_TOKEN }}
  MASOFFER_PUBLISHER_ID: ${{ secrets.MASOFFER_PUBLISHER_ID }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  sync:
    name: Sync Offers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Supabase
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "ERROR: SUPABASE_URL or SUPABASE_SERVICE_KEY not set in GitHub Secrets"
            exit 1
          fi

      - name: Sync AccessTrade
        if: env.ACCESSTRADE_API_KEY != ''
        run: |
          EXTRA=""
          DRY="${{ inputs.dry_run || 'false' }}"
          [ "$DRY" = "true" ] && EXTRA="--dry-run"
          echo ""
          echo "====== [1/2] AccessTrade | mode=${{ inputs.mode || 'incremental' }} | dry=$DRY ======"
          node scripts/sync-at-offers.js $EXTRA
          echo "================================================================"

      - name: Sync MasOffer
        if: false  # DISABLED — MasOffer API (publisher-api.masoffer.net) has been shut down. Migrate to AnyMind platform.
        run: |
          EXTRA=""
          DRY="${{ inputs.dry_run || 'false' }}"
          [ "$DRY" = "true" ] && EXTRA="--dry-run"
          echo ""
          echo "====== [2/2] MasOffer | mode=${{ inputs.mode || 'incremental' }} | dry=$DRY ======"
          node scripts/sync-masoffer-offers.js $EXTRA
          echo "=============================================================="

      - name: Report skipped sources
        if: always()
        run: |
          if [ -z "$ACCESSTRADE_API_KEY" ]; then
            echo "⚠  AccessTrade skipped — ACCESSTRADE_API_KEY not configured"
          fi
          echo "⚠  MasOffer skipped — MasOffer API shut down, migrated to AnyMind"

      - name: Step summary
        if: always()
        run: |
          echo "## Sync — $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Configured |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| AccessTrade | $([ -n "$ACCESSTRADE_API_KEY" ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| MasOffer | ❌ (API shut down — migrated to AnyMind) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }} | **Mode:** ${{ inputs.mode || 'incremental' }} | **Dry run:** ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
