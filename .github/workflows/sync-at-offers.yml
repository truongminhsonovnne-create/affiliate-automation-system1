name: Sync — Offers (AccessTrade & MasOffer)

on:
  # Run twice daily at 07:00 and 19:00 UTC (2pm and 2am Vietnam: UTC+7)
  schedule:
    - cron: '0 7,19 * * *'

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED GITHUB SECRETS — Settings → Secrets and variables → Actions
# ──────────────────────────────────────────────────────────────────────────────
# AccessTrade:
#   ACCESSTRADE_API_KEY  — from pub.accesstrade.vn
# MasOffer:
#   MASOFFER_API_TOKEN   — from publisher.masoffer.net
#   MASOFFER_PUBLISHER_ID — your MasOffer publisher ID
# Shared:
#   SUPABASE_URL         — https://xxx.supabase.co
#   SUPABASE_SERVICE_KEY — service role key
# ──────────────────────────────────────────────────────────────────────────────

env:
  ACCESSTRADE_API_KEY: ${{ secrets.ACCESSTRADE_API_KEY }}
  MASOFFER_API_TOKEN: ${{ secrets.MASOFFER_API_TOKEN }}
  MASOFFER_PUBLISHER_ID: ${{ secrets.MASOFFER_PUBLISHER_ID }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  sync:
    name: Sync All Offers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Supabase secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "ERROR: SUPABASE_URL or SUPABASE_SERVICE_KEY is not set in GitHub Secrets"
            exit 1
          fi
          echo "✓ Supabase configured: ${SUPABASE_URL:0:40}..."

      - name: Sync AccessTrade
        if: env.ACCESSTRADE_API_KEY != ''
        run: |
          EXTRA=""
          [ "${{ inputs.dry_run || 'false' }}" = "true" ] && EXTRA="--dry-run"
          echo ""
          echo "========== [1/2] AccessTrade =========="
          node scripts/sync-at-offers.js $EXTRA
          echo "========================================"

      - name: Sync MasOffer
        if: env.MASOFFER_API_TOKEN != ''
        run: |
          EXTRA=""
          [ "${{ inputs.dry_run || 'false' }}" = "true" ] && EXTRA="--dry-run"
          echo ""
          echo "========== [2/2] MasOffer =========="
          node scripts/sync-masoffer-offers.js $EXTRA
          echo "===================================="

      - name: Skip missing sources report
        if: always()
        run: |
          if [ -z "$ACCESSTRADE_API_KEY" ]; then
            echo "⚠  AccessTrade skipped — ACCESSTRADE_API_KEY not set"
          fi
          if [ -z "$MASOFFER_API_TOKEN" ]; then
            echo "⚠  MasOffer skipped — MASOFFER_API_TOKEN not set"
          fi
          if [ -n "$ACCESSTRADE_API_KEY" ] && [ -n "$MASOFFER_API_TOKEN" ]; then
            echo "✓  Both sources configured"
          fi

      - name: Step summary
        if: always()
        run: |
          echo "## Sync — $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| AccessTrade | ${{ env.ACCESSTRADE_API_KEY != '' && 'configured' || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MasOffer | ${{ env.MASOFFER_API_TOKEN != '' && 'configured' || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** ${{ github.event_name }} | **Dry run:** ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
