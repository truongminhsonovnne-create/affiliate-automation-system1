name: Sync Scheduler

on:
  # Run on schedule (UTC). Adjust cron to match your timezone.
  # Default: 06:00 and 18:00 UTC daily (1pm and 1am Vietnam time: UTC+7)
  schedule:
    - cron: '0 6,18 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated source keys (leave empty for all enabled)'
        required: false
        default: ''
        type: string
      mode:
        description: 'Sync mode'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED GITHUB SECRETS — set these in: Settings → Secrets and variables → Actions
# ──────────────────────────────────────────────────────────────────────────────
# SYNC_ENDPOINT_URL      — Full URL of your deployed sync endpoint.
#                         Example: https://your-app.up.railway.app
#                         The workflow will call:
#                           - {SYNC_ENDPOINT_URL}/api/internal/sync/health
#                           - {SYNC_ENDPOINT_URL}/api/internal/sync/daily
#
# SYNC_SHARED_SECRET    — Secret string (≥ 32 random hex chars).
#                         Must match the SYNC_SHARED_SECRET env var on your server.
#                         Generate: openssl rand -hex 32
#                         This is sent as the x-sync-secret HTTP header.
# ──────────────────────────────────────────────────────────────────────────────

env:
  SYNC_ENDPOINT_URL: ${{ secrets.SYNC_ENDPOINT_URL }}
  SYNC_SHARED_SECRET: ${{ secrets.SYNC_SHARED_SECRET }}

jobs:
  sync:
    name: Run Daily Sync
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SYNC_ENDPOINT_URL }}" ]; then
            echo "ERROR: SYNC_ENDPOINT_URL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SYNC_SHARED_SECRET }}" ]; then
            echo "ERROR: SYNC_SHARED_SECRET secret is not set"
            exit 1
          fi
          echo "✓ Secrets validated"

      - name: Run Health Check
        id: health
        run: |
          echo "--- Health Check ---"
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            -H "x-sync-secret: ${{ secrets.SYNC_SHARED_SECRET }}" \
            "${{ secrets.SYNC_ENDPOINT_URL }}/api/internal/sync/health")

          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/health.json | head -c 500

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check failed — aborting sync"
            exit 1
          fi

          # Extract DB status
          DB_STATUS=$(cat /tmp/health.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('database',{}).get('status','unknown'))" 2>/dev/null || echo "unknown")
          echo "Database status: $DB_STATUS"

          if [ "$DB_STATUS" != "connected" ]; then
            echo "WARNING: Database may not be connected — continuing anyway"
          fi

      - name: Build Request Body
        id: body
        run: |
          BODY='{}'

          # Dry run
          if [ "${{ inputs.dry_run || 'false' }}" = "true" ]; then
            BODY=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); d['dryRun']=True; print(json.dumps(d))")
            echo "MODE: DRY RUN (no DB writes)"
          else
            echo "MODE: LIVE (will write to database)"
          fi

          # Sources filter
          if [ -n "${{ inputs.sources }}" ]; then
            SOURCES=$(echo '${{ inputs.sources }}' | python3 -c "import sys,json; srcs=[s.strip() for s in sys.stdin.read().split(',') if s.strip()]; print(json.dumps(srcs))")
            BODY=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); d['sources']=json.loads('$SOURCES'); print(json.dumps(d))")
            echo "SOURCES: ${{ inputs.sources }}"
          else
            echo "SOURCES: all enabled"
          fi

          # Mode
          BODY=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); d['mode']='${{ inputs.mode || 'incremental' }}'; print(json.dumps(d))")
          echo "MODE: ${{ inputs.mode || 'incremental' }}"

          echo "body=$BODY" >> $GITHUB_OUTPUT
          echo "Request body: $BODY"

      - name: Trigger Sync
        id: sync
        run: |
          echo "--- Triggering Sync ---"
          echo "Endpoint: ${{ secrets.SYNC_ENDPOINT_URL }}/api/internal/sync/daily"

          HTTP_CODE=$(curl -s -o /tmp/sync-result.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-sync-secret: ${{ secrets.SYNC_SHARED_SECRET }}" \
            -d "${{ env.BODY || '{}' }}" \
            --max-time 600 \
            "${{ secrets.SYNC_ENDPOINT_URL }}/api/internal/sync/daily")

          echo "HTTP Status: $HTTP_CODE"
          echo ""
          echo "Response:"
          cat /tmp/sync-result.json

          echo ""
          echo "sync_http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" = "200" ]; then
            # Extract summary
            echo ""
            echo "=== Sync Summary ==="

            TOTAL=$(cat /tmp/sync-result.json | python3 -c "import sys,json; d=json.load(sys.stdin); s=d.get('sources',{}); print(f\"Total: {s.get('total',0)} | Success: {s.get('successful',0)} | Failed: {s.get('failed',0)} | Skipped: {s.get('skipped',0)}\")" 2>/dev/null)
            echo "$TOTAL"

            echo "Duration: $(cat /tmp/sync-result.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('durationMs',0))" 2>/dev/null)ms"

            echo ""
            echo "Per-source results:"
            cat /tmp/sync-result.json | python3 -c "
import sys,json
d=json.load(sys.stdin)
detail=d.get('detail',{})
for src, res in detail.items():
    status=res.get('status','?')
    ins=res.get('inserted',0)
    upd=res.get('updated',0)
    ski=res.get('skipped',0)
    errs=len(res.get('errors',[]))
    dur=res.get('durationMs',0)
    print(f'  {src}: {status} (+{ins}, ~{upd}, {ski} skip, {errs} errors, {dur}ms)')
" 2>/dev/null

          elif [ "$HTTP_CODE" = "500" ]; then
            echo ""
            echo "Sync completed with errors. Check Supabase sync_runs table for details."
          else
            echo ""
            echo "Unexpected response — check endpoint and secrets."
            exit 1
          fi

      - name: Set step summary
        if: always()
        run: |
          echo "## Sync Scheduler — ${{ github.run_number }} — $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status Code:** ${{ env.sync_http_code || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ inputs.mode || 'incremental' }}" >> $GITHUB_STEP_SUMMARY

          if [ -f /tmp/sync-result.json ]; then
            echo "**Duration:** $(cat /tmp/sync-result.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('durationMs','N/A')" 2>/dev/null)ms" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat /tmp/sync-result.json 2>/dev/null | head -c 1000 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
